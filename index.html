<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jupioo — Bientôt disponible</title>
  <meta name="description" content="Une nouvelle façon d'organiser votre quotidien de soignant libéral. Bientôt disponible.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #1D9E75;
      --teal-light: #E1F5EE;
      --teal-dark: #0F6E56;
      --coral: #F0997B;
      --text: #1a1a1a;
      --text-2: #5a5a5a;
      --text-3: #aaa;
      --bg: #ffffff;
      --bg-2: #f7f7f5;
      --border: rgba(0,0,0,0.07);
      --r: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f0ede8;
        --text-2: #a0a09a;
        --text-3: #555;
        --bg: #111110;
        --bg-2: #1a1a18;
        --border: rgba(255,255,255,0.07);
      }
    }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    /* LOGO */
    .logo { margin-bottom: 3.5rem; }

    /* BADGE */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--text-2);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      margin-bottom: 2rem;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--coral);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* HEADLINE */
    h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -1px;
      margin-bottom: 1.25rem;
      max-width: 580px;
    }
    h1 em { font-style: normal; color: var(--teal); }

    /* SUBLINE */
    p {
      font-size: 17px;
      color: var(--text-2);
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 2.5rem;
    }

    /* CTA */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 15px 32px;
      background: var(--teal);
      color: #fff;
      border-radius: var(--r);
      font-size: 15px;
      font-weight: 500;
      transition: background .15s, transform .1s;
      margin-bottom: 1rem;
    }
    .cta:hover { background: var(--teal-dark); transform: translateY(-1px); }
    .cta-note {
      font-size: 12px;
      color: var(--text-3);
    }

    /* PROGRESS */
    .progress {
      margin-top: 4rem;
      width: 100%;
      max-width: 360px;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 8px;
    }
    .bar-wrap {
      background: var(--border);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
    }
    .bar-fill {
      width: 18%;
      height: 100%;
      background: var(--teal);
      border-radius: 4px;
      animation: pb 2.5s ease-in-out infinite;
    }
    @keyframes pb { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* FOOTER */
    footer {
      margin-top: 4rem;
      font-size: 12px;
      color: var(--text-3);
    }

    @media (max-width: 480px) {
      .cta { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- LOGO -->
  <div class="logo">
    <svg width="200" height="56" viewBox="0 0 240 58" fill="none">
      <text x="50" y="46" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="44" font-weight="500" letter-spacing="-2" fill="#1a1a1a">jupi</text>
      <circle cx="148" cy="26" r="20" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
      <path d="M165 26 Q175 26 175 17 Q175 6 186 6" stroke="#0F6E56" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="187" cy="4" r="5.5" fill="#F0997B"/>
      <circle cx="144" cy="19" r="4" fill="#1D9E75"/>
      <path d="M138 34 Q148 43 160 34" stroke="#1D9E75" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="200" cy="26" r="20" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
      <circle cx="196" cy="19" r="4" fill="#1D9E75"/>
      <path d="M190 34 Q200 43 212 34" stroke="#1D9E75" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- BADGE -->
  <div class="badge">
    <div class="badge-dot"></div>
    En cours de construction
  </div>

  <!-- HEADLINE -->
  <h1>Et si votre tournée<br>s'organisait <em>toute seule</em> ?</h1>

  <!-- SUBLINE -->
  <p>Une nouvelle app pour les soignants libéraux. Bientôt disponible — aidez-nous à la construire.</p>

  <!-- CTA -->
  <a href="https://docs.google.com/forms/d/e/1FAIpQLSfWkFMsSjV9yg8ZWfUD7MkTuitjHAlRaPWExoBLQa8mk0spNQ/viewform?usp=publish-editor" target="_blank" class="cta">
    Participer à la bêta gratuite →
  </a>
  <div class="cta-note">2 minutes · Anonyme · Accès prioritaire</div>

  <!-- PROGRESS -->
  <div class="progress">
    <div class="progress-header">
      <span>Développement en cours</span>
      <span>18%</span>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>© 2026 Jupioo</footer>

</body>
</html>
